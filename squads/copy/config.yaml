# ─────────────────────────────────────────────────────────────────────────────
# QUALITY STANDARDS
# ─────────────────────────────────────────────────────────────────────────────

quality_standards:
  hopkins_audit:
    min_score: 85
    max_score: 100
    required: true
    description: "Scientific advertising audit by @claude-hopkins"

  sugarman_triggers:
    min_coverage: 80
    total_triggers: 30
    required: true
    description: "Sugarman 30 psychological triggers check"

  tier_0_diagnosis:
    required: true
    description: "NEVER skip Tier 0 diagnosis before execution"

