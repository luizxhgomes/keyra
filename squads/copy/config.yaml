# ═══════════════════════════════════════════════════════════════════════════════
# Squad: Copy
# Domain: Copywriting — Direct Response & Launch Strategy
# Created: 2026-03-14
# Version: 1.0.0
# ═══════════════════════════════════════════════════════════════════════════════

squad:
  name: copy
  display_name: "Copy Squad"
  version: "1.0.0"
  domain: "Copywriting — Direct Response & Launch Strategy"
  description: |
    Squad especialista em copywriting de resposta direta, liderado pelo Copy Chief
    que orquestra 24 copywriters lendarios usando sistema de Tiers.
    Diagnostico Tier 0 -> Execucao Tier 1-3 -> Auditoria Hopkins -> 30 Triggers.

  philosophy: |
    "Copy is the salesman in print."
    Cada copywriter do squad e baseado em uma mente lendaria real com frameworks
    documentados. O sistema garante qualidade via diagnostico obrigatorio (Tier 0),
    selecao inteligente de copywriter, e dupla auditoria (Hopkins + Sugarman).

  keywords:
    - copywriting
    - direct-response
    - sales-page
    - email-sequence
    - vsl
    - headlines
    - ads
    - launch
    - plf
    - product-launch-formula
    - conversion
    - persuasion

  entry_agent: copy-chief
  created_by: "manual"
  created_at: "2026-03-14"

# ─────────────────────────────────────────────────────────────────────────────
# TIER ARCHITECTURE
# ─────────────────────────────────────────────────────────────────────────────

tiers:
  tier_0:
    name: "Diagnosis & Audit"
    agents:
      - copy-chief
      - eugene-schwartz
      - claude-hopkins
    purpose: "Triage: awareness level, market sophistication, scientific audit"

  tier_1:
    name: "Master Copywriters"
    agents:
      - gary-halbert
      - gary-bencivenga
      - david-ogilvy
    purpose: "Top-tier execution for high-stakes copy"

  tier_2:
    name: "Specialist Copywriters"
    agents:
      - dan-kennedy
      - todd-brown
      - jeff-walker
    purpose: "Domain specialists: urgency, unique mechanism, launches"

  tier_3:
    name: "Format Specialists"
    agents:
      - jon-benson
      - ry-schwartz
      - robert-collier
    purpose: "Format-specific: VSL, enrollment copy, mental conversation"

