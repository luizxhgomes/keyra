# ============================================================================
# FRAMEWORKS — REFERENCIA RAPIDA
# ============================================================================

frameworks_reference:

  goldratt:
    name: "TOC + Mafia Offer"
    core: "O gargalo define tudo"
    five_focusing_steps: ["IDENTIFY", "EXPLOIT", "SUBORDINATE", "ELEVATE", "REPEAT"]
    mafia_offer: "Oferta que o cliente nao pode recusar E concorrencia nao pode copiar"
    evaporating_cloud: "Resolver conflitos mapeando e invalidando pressupostos falsos"
    throughput_accounting: "T = Throughput, I = Investment, OE = Operating Expense"

  hormozi:
    name: "Grand Slam Offer + Value Equation"
    core: "Se precisa de closer, a oferta e fraca"
    value_equation: "V = (Dream Outcome x Perceived Likelihood) / (Time Delay x Effort & Sacrifice)"
    components: ["Oferta principal", "Bonus stack", "Garantia reversa", "Naming MAGIC", "Pricing por valor"]

  ury:
    name: "Principled Negotiation + BATNA"
    core: "Interesses, nao posicoes"
    four_principles: ["Separe pessoa do problema", "Foque em interesses", "Crie opcoes mutuas", "Criterios objetivos"]
    batna: "Best Alternative To Negotiated Agreement"
    zopa: "Zone Of Possible Agreement"

  cialdini:
    name: "7 Principios + Pre-Suasion"
    core: "Persuasao acontece ANTES da mensagem"
    seven_principles: ["Reciprocidade", "Consistencia", "Prova Social", "Autoridade", "Afinidade", "Escassez", "Unidade"]
    pre_suasion: "Controlar atencao e frame ANTES da mensagem principal"

  voss:
    name: "Black Swan Method"
    core: "Empatia tatica, nao simpatia"
    tools: ["Espelhamento", "Labeling", "Perguntas calibradas", "That's right", "No-oriented"]
    ackerman: ["65%", "85%", "95%", "100% nao-redondo"]
    black_swans: "3 informacoes desconhecidas que mudam tudo"
    dj_voice: "Late-night FM DJ voice"

  belfort:
    name: "Straight Line Selling"
    core: "Os primeiros 4 segundos definem tudo"
    three_tens: "Certeza em Produto, Vendedor, Empresa (1-10)"
    tonality_patterns: ["Certeza absoluta", "Curiosidade sincera", "Empatia declarativa", "Misterio/sussurro", "Fato consumado"]
    looping: "Cada objecao e pedido por mais certeza"

  trump:
    name: "DITF + Structured Choice"
    core: "Alavancagem e tudo"
    ditf: "Door in the Face — peca o impossivel, depois ofereca o desejado"
    structured_choice: "2 opcoes — ambas favoraveis a voce"
    warning: "RESERVA — so com alavancagem real"

  cohen:
    name: "Poder + Tempo + Informacao"
    core: "Quem precisa menos, negocia melhor"
    three_variables: ["Poder", "Tempo", "Informacao"]
    calibrated_detachment: "Care, but not that much"
    five_year_test: "Daqui a 5 anos, isso vai importar?"

