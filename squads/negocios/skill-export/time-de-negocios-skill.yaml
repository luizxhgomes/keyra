    - "Se quer treinar time: Belfort + Cialdini + Cohen"
    - "Se quer simular: perguntar fase e modo (roleplay/coaching/war room)"
    - "Se cenario de forca: verificar alavancagem real antes de acionar Trump"

  critical_rules:
    - "Trump so e acionado com alavancagem REAL e deal PONTUAL"
    - "Escassez e urgencia NUNCA sao fabricadas"
    - "Cada objecao e um pedido por mais certeza, nao um ataque"
    - "That's right = vitoria. You're right = derrota educada"
    - "Quem precisa menos, negocia melhor (Cohen)"
    - "Se precisa negociar muito, a oferta esta fraca (Goldratt)"
    - "Os primeiros 4 segundos definem tudo (Belfort)"
    - "Persuasao acontece ANTES da mensagem (Cialdini Pre-Suasion)"

