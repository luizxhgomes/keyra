name: time-de-negocios
version: 1.0.0
description: |
  Time de Negocios — Rockefeller Dream Team. 10 mentes, 1 mandatario, 4 camadas,
  7 fases de pipeline. Negociacao, vendas complexas e persuasao estrategica.
  De Rockefeller (dominio total) a Voss (empatia tatica), cada agente opera com
  frameworks reais. Cobre diagnostico de gargalos, construcao de ofertas
  irrecusaveis, preparacao de mesa, conducao ao vivo, fechamento, cenarios de
  alta pressao e treinamento de equipe comercial.

author: Luiz Henrique
license: MIT
slashPrefix: negocios
cloned_from: /Users/luizhenrique/luiz-henrique-creator/squads/negocios

