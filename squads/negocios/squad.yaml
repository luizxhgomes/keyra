dependencies:
  node: []
  python: []
  squads: []

philosophy:
  core_mantra: "Controle a cadeia inteira — quem depende de voce nao negocia, aceita."
  camadas:
    mandatario: "Rockefeller — visao de dominio total, decisao estrategica"
    camada_1: "Goldratt (TOC) + Hormozi (Grand Slam Offer) + Naval (leverage)"
    camada_2: "Ury (BATNA) + Cialdini (7 principios + Pre-Suasion)"
    camada_3: "Voss (empatia tatica) + Belfort (Straight Line)"
    camada_4: "Trump (ancoragem extrema) + Cohen (poder + tempo + info) — reservas"
  pipeline_7_fases:
    - "1. Diagnostico: Goldratt + Hormozi + Naval"
    - "2. Oferta: Goldratt + Hormozi + Naval + Cialdini"
    - "3. Pre-mesa: Naval + Ury + Cialdini"
    - "4. Funil: Voss + Cialdini"
    - "5. Fechamento: Voss + Belfort + Cialdini"
    - "6. Alta pressao: Trump + Cohen (requer autorizacao Rockefeller)"
    - "7. Treino: Belfort + Cialdini + Cohen"
