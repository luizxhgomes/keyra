name: "KEYRA Intelligence Squad"
version: 0.2.0
description: "Squad para Fases 5-6 do KEYRA — motor de precificação, projeções financeiras, inteligência preditiva e recomendações"
author: "AIOX"
license: MIT

aiox:
  minVersion: "2.1.0"
  type: squad

agents:
  # Ciclo de desenvolvimento
  - sm                        # River — Criação de stories dos Epics 5-6
  - po                        # Pax — Validação de stories
  - dev                       # Dex — Implementação
  - qa                        # Quinn — QA de fórmulas e projeções
  - devops                    # Gage — Push/PRs
  # Especialistas
  - architect                 # Aria — Arquitetura: regras vs ML, decisões técnicas
  - data-engineer             # Dara — Queries de agregação, materialized views
  - finance-domain-expert     # Valéria — Define e valida TODAS as fórmulas

mission: |
  Implementar a camada de inteligência do KEYRA (pós-MVP):

  Epic 5 — Motor de Precificação:
  - Precificação inteligente: custos variáveis + rateio fixo + margem desejada
  - Precificação de pacotes (ex: 5 sessões com 10% off, receita diferida)
  - Simulação de cenários de preço (e se aumentar 10%? e se reduzir custo?)
  - Alertas de estoque baixo e sugestão de recompra
  - Recomendações de preço por benchmark local (IA de preços)

  Epic 6 — Inteligência + Projeções:
  - Previsão de lucro semanal/mensal baseada na agenda preenchida
  - Cenários what-if (+10% upsell, +5 agendamentos, reduzir custo X)
  - Rentabilidade por horário (lucro/hora por faixa horária)
  - Rentabilidade por profissional com alertas de baixa performance
  - Panoramas para construção de metas (suporte à mentora financeira)
  - Prontuário financeiro por cliente (ticket médio, frequência, LTV)
  - Sugestões de upsell na agenda (baseado em histórico do paciente)

  REGRAS:
  - @finance-domain-expert (Valéria) define e valida TODAS as fórmulas
  - @architect (Aria) decide abordagem técnica: regras determinísticas na v1, ML no futuro
  - @data-engineer (Dara) otimiza queries de agregação (materialized views, CTEs)
  - Dashboard segue princípio UX: NÚMEROS ABSOLUTOS, nunca gráficos
    EXCEÇÃO: heatmap de rentabilidade por horário é visual por natureza

  Decisão Arquitetural (ADR):
  - v1: 100% regras determinísticas (SQL + TypeScript) — sem ML
  - v2 (futuro): ML leve para sugestões de upsell e benchmark de preços
  - Motivo: dados insuficientes na v1, complexidade desnecessária

components:
  tasks:
    # Epic 5 — Motor de Precificação
    - architect-spec-motor-precificacao.md
    - finance-definir-formulas-precificacao.md
    - dev-precificacao-servico-margem.md
    - dev-precificacao-pacotes.md
    - dev-simulacao-cenarios-preco.md
    - dev-alertas-estoque-recompra.md
    - dev-recomendacoes-preco-benchmark.md
    # Epic 6 — Inteligência + Projeções
    - architect-spec-projecoes-preditivas.md
    - finance-definir-formulas-projecao.md
    - dev-previsao-lucro-agenda.md
    - dev-cenarios-what-if.md
    - dev-rentabilidade-horario-profissional.md
    - dev-prontuario-financeiro-cliente.md
    - dev-sugestoes-upsell-agenda.md
    # Transversal
    - finance-validar-formulas-inteligencia.md
  workflows:
    - keyra-inteligencia-spec-sdc.yaml
  checklists:
    - checklist-formulas-precificacao.md
    - checklist-projecoes.md
    - checklist-qa-inteligencia.md
  config:
    - formulas-precificacao.md
    - formulas-projecao.md
    - abordagem-tecnica.md
  data:
    - cenarios-precificacao.yaml
    - cenarios-projecao.yaml

workflow: keyra-inteligencia-spec-sdc.yaml

dependencies:
  - squad-keyra-core   # Transações, serviços, custos, agenda, DRE — base de dados

keywords:
  - inteligência
  - precificação
  - projeção
  - simulação
  - what-if
  - rentabilidade
  - upsell
  - metas
  - benchmark
  - prontuário
